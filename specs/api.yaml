openapi: 3.1.0
info:
  title: Ingredients API
  description: Ingredients API
  version: 1.0.0
servers:
  - url: 'http://localhost:8080'
paths:
  /ingredients:
    get:
      summary: Récupérer tous les ingrédients
      tags:
        - Ingredients
      responses:
        '200':
          description: Liste de tous les ingrédients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string

  /ingredients/{id}:
    get:
      summary: Récupérer un ingrédient par id
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Ingrédient ayant l'id correspondant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '404':
          description: Ingrédient non trouvé
          content:
            application/json:
              schema:
                type: string
                example: "Ingredient.id=1 is not found"

  /ingredients/{id}/stock:
    get:
      summary: Retourner la valeur de stock d'un ingrédient à une date précise
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
        - name: at
          in: query
          required: false
          schema:
            type: string
            example: "2024-01-06T12:00:00Z"
        - name: unit
          in: query
          required: false
          schema:
            type: string
            example: "KG"
      responses:
        '200':
          description: Succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stock'
        '404':
          description: Ingrédient non trouvé
          content:
            application/json:
              schema:
                type: string
                example: "Ingredient.id=1 is not found"
        '400':
          description: Paramètres non fournis
          content:
            application/json:
              schema:
                type: string
                example: " “Either mandatory query parameter `at` or `unit` is not provided"

  /dishes:
    get:
      summary: Récupérer tous les plats
      tags:
        - Dishes
      responses:
        '200':
          description: Succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'
        '500':
          description: Internal Sever Error
          content:
            application/json:
              schema:
                type: string

  /dishes/{id}/ingredients:
    put:
      summary: Associer ou dissocier des ingrédients à un plat
      tags:
        - Dishes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Ingredient'
      responses:
        '200':
          description: Succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '400':
          description: Corps de requête manquant
          content:
            application/json:
              schema:
                type: string
                example: "Ingredient list is null, request body is required"
        '404':
          description: Plat inexistant
          content:
            application/json:
              schema:
                type: string
                example: "Dish.id=1 is not found"

components:
  schemas:
    Ingredient:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "tomate"
        price:
          type: number
          format: double
        category:
          type: string
          enum:
            - VEGETABLE
            - ANIMAL
            - MARINE
            - DAIRY
            - OTHER
          example: "VEGETABLE"
    Stock:
      type: object
      properties:
        quantity:
          type: number
          format: double
        unit:
          type: string
          enum:
            - PCS
            - KG
            - L
          example: "KG"
    Dish:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Gâteau au chocolat"
        price:
          type: number
          format: double
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'



